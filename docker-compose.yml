version: '3.8'

services:
  db:
    image: postgres:16
    container_name: shop-postgres
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - shop-pgdata:/var/lib/postgresql/data

volumes:
  shop-pgdata:
  