<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Product Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: #e2ddd6;
      --text: #1a1714;
      --muted: #6b6560;
      --accent: #2d5a27;
      --accent-light: #e8f0e7;
      --accent-hover: #234820;
      --danger: #c0392b;
      --danger-light: #fdecea;
      --warn: #b7600e;
      --warn-light: #fef3e7;
      --tag-bg: #e6efe5;
      --tag-text: #2d5a27;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    .cart-btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }
    .cart-btn:hover { background: var(--surface2); }

    .cart-badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    .main { display: flex; gap: 0; min-height: calc(100vh - 60px); }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Cart Panel ── */
    .cart-panel {
      position: fixed;
      top: 60px;
      right: 0;
      width: 360px;
      height: calc(100vh - 60px);
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,0.06);
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      z-index: 99;
      display: flex;
      flex-direction: column;
    }
    .cart-panel.open { transform: translateX(0); }

    .cart-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-header h2 { font-size: 16px; font-weight: 600; }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .close-btn:hover { background: var(--surface2); }

    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 12px; }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
    }

    .cart-item-img {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: var(--border);
      object-fit: cover;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 500; }
    .cart-item-price { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 24px; height: 24px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s;
    }
    .qty-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .qty-num { font-size: 13px; font-weight: 500; min-width: 16px; text-align: center; }

    .cart-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .cart-total {
      display: flex; justify-content: space-between;
      font-weight: 600; font-size: 16px; margin-bottom: 1rem;
    }
    .cart-total span:last-child { font-family: 'DM Mono', monospace; }

    .checkout-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .checkout-btn:hover { background: var(--accent-hover); }

    .empty-cart {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Product area ── */
    .products-area { flex: 1; padding: 2rem; overflow-y: auto; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .count-badge {
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      color: var(--muted);
      font-weight: 500;
    }

    .add-all-btn {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--tag-bg);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .add-all-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    .product-img {
      height: 160px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
    }

    .stock-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 20px;
      padding: 2px 8px;
    }
    .stock-ok { background: #e8f5e8; color: #2d6e2d; }
    .stock-low { background: var(--warn-light); color: var(--warn); }
    .stock-out { background: var(--danger-light); color: var(--danger); }

    .product-body { padding: 14px; }
    .product-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .product-price {
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .product-actions { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-add {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-add:hover { background: var(--accent-hover); }

    .btn-edit {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-edit:hover { background: var(--border); }

    .btn-del {
      background: var(--danger-light);
      color: var(--danger);
      border-color: transparent;
      flex: none;
      padding: 7px 10px;
    }
    .btn-del:hover { background: var(--danger); color: #fff; }

    /* ── Form section ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .form-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }

    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .form-input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border 0.15s;
    }
    .form-input:focus { border-color: var(--accent); background: var(--surface); }

    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-submit {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-cancel {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-cancel:hover { background: var(--border); }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      background: var(--text);
      color: #fff;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      animation: slideUp 0.25s ease;
      white-space: nowrap;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Loader ── */
    .loader { text-align: center; padding: 4rem; color: var(--muted); }

    .error-banner {
      background: var(--danger-light);
      border: 1px solid #f5c6c2;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--danger);
      font-size: 14px;
      margin-bottom: 1rem;
    }

    /* ── Emoji palette for auto-icon ── */
    .emoji-icon { font-size: 44px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Shop Admin
  </div>
  <div class="header-actions">
    <button class="cart-btn" id="cartToggle">
      🛒 Cart
      <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="main">
  <!-- Sidebar: Add / Edit form -->
  <aside class="sidebar">
    <div>
      <p class="sidebar-title" id="formMode">Add product</p>
    </div>
    <div class="form-card">
      <form id="productForm">
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label class="form-label" for="fname">Name</label>
          <input class="form-input" id="fname" placeholder="e.g. Wireless Headphones" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="fprice">Price ($)</label>
          <input class="form-input" id="fprice" type="number" min="0" step="0.01" placeholder="0.00" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="fstock">Stock</label>
          <input class="form-input" id="fstock" type="number" min="0" placeholder="0" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="fimage">Image URL (optional)</label>
          <input class="form-input" id="fimage" placeholder="https://..." />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit" id="submitBtn">Add product</button>
          <button type="button" class="btn-cancel" id="cancelBtn" style="display:none">Cancel</button>
        </div>
      </form>
    </div>
  </aside>

  <!-- Main product area -->
  <div class="products-area">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <h1 class="section-title">Products</h1>
        <span class="count-badge" id="productCount">0 items</span>
      </div>
      <button class="add-all-btn" id="addAllBtn">+ Add all to cart</button>
    </div>

    <div id="errorBanner" class="error-banner" style="display:none;"></div>
    <div id="loader" class="loader">Loading products…</div>
    <div class="product-grid" id="productGrid"></div>
  </div>
</div>

<!-- Cart panel -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Cart</h2>
    <button class="close-btn" id="closeCart">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">$0.00</span>
    </div>
    <button class="checkout-btn">Checkout →</button>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const API = 'http://localhost:3001/api';

  // ── State ──
  let products = [];
  let cart = {};   // { id: { product, qty } }
  let editingId = null;

  // ── DOM refs ──
  const grid = document.getElementById('productGrid');
  const loader = document.getElementById('loader');
  const errorBanner = document.getElementById('errorBanner');
  const cartPanel = document.getElementById('cartPanel');
  const cartItemsEl = document.getElementById('cartItems');
  const cartCountEl = document.getElementById('cartCount');
  const cartTotalEl = document.getElementById('cartTotal');
  const productCount = document.getElementById('productCount');
  const form = document.getElementById('productForm');
  const formMode = document.getElementById('formMode');
  const submitBtn = document.getElementById('submitBtn');
  const cancelBtn = document.getElementById('cancelBtn');

  // ── Emoji auto-assign by ID ──
  const EMOJIS = ['🎧','📷','💻','🖥️','⌨️','🖱️','📱','🎮','🔊','📡','🔋','💡','📦','🧲','🎯'];
  const getEmoji = (id) => EMOJIS[id % EMOJIS.length];

  // ── API helpers ──
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || 'API error');
    }
    return res.json();
  }

  // ── Fetch products ──
  async function loadProducts() {
    loader.style.display = 'block';
    grid.innerHTML = '';
    errorBanner.style.display = 'none';
    try {
      products = await apiFetch('/products');
      renderGrid();
    } catch (e) {
      showError(e.message);
    } finally {
      loader.style.display = 'none';
    }
  }

  // ── Render ──
  function renderGrid() {
    productCount.textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;
    grid.innerHTML = '';
    if (!products.length) {
      grid.innerHTML = '<p style="color:var(--muted);font-size:14px;">No products yet. Add one!</p>';
      return;
    }
    products.forEach(p => {
      const stockClass = p.stock === 0 ? 'stock-out' : p.stock < 5 ? 'stock-low' : 'stock-ok';
      const stockLabel = p.stock === 0 ? 'Out of stock' : p.stock < 5 ? `Only ${p.stock} left` : `${p.stock} in stock`;
      const imgContent = p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;" />`
        : `<span class="emoji-icon">${getEmoji(p.id)}</span>`;

      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-img">
          ${imgContent}
          <span class="stock-badge ${stockClass}">${stockLabel}</span>
        </div>
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          <div class="product-price">$${parseFloat(p.price).toFixed(2)}</div>
          <div class="product-actions">
            <button class="btn btn-add" data-id="${p.id}">+ Add to cart</button>
            <button class="btn btn-edit" data-id="${p.id}">Edit</button>
            <button class="btn btn-del" data-id="${p.id}">✕</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // ── Add/Edit form submit ──
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
      name: document.getElementById('fname').value.trim(),
      price: parseFloat(document.getElementById('fprice').value),
      stock: parseInt(document.getElementById('fstock').value),
      image_url: document.getElementById('fimage').value.trim() || null,
    };
    try {
      if (editingId) {
        await apiFetch(`/products/${editingId}`, { method: 'PUT', body: JSON.stringify(body) });
        toast('Product updated');
      } else {
        await apiFetch('/products', { method: 'POST', body: JSON.stringify(body) });
        toast('Product added');
      }
      resetForm();
      loadProducts();
    } catch (e) {
      toast(e.message, true);
    }
  });

  // ── Delete ──
  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try {
      await apiFetch(`/products/${id}`, { method: 'DELETE' });
      toast('Product deleted');
      loadProducts();
    } catch (e) { toast(e.message, true); }
  }

  // ── Edit ──
  function startEdit(id) {
    const p = products.find(x => x.id == id);
    if (!p) return;
    editingId = id;
    document.getElementById('fname').value = p.name;
    document.getElementById('fprice').value = p.price;
    document.getElementById('fstock').value = p.stock;
    document.getElementById('fimage').value = p.image_url || '';
    formMode.textContent = 'Edit product';
    submitBtn.textContent = 'Save changes';
    cancelBtn.style.display = 'block';
    document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth' });
  }

  function resetForm() {
    editingId = null;
    form.reset();
    formMode.textContent = 'Add product';
    submitBtn.textContent = 'Add product';
    cancelBtn.style.display = 'none';
  }

  cancelBtn.addEventListener('click', resetForm);

  // ── Cart ──
  function addToCart(id) {
    const p = products.find(x => x.id == id);
    if (!p) return;
    if (cart[id]) cart[id].qty++;
    else cart[id] = { product: p, qty: 1 };
    renderCart();
    toast(`${p.name} added to cart`);
  }

  function addAllToCart() {
    products.forEach(p => {
      if (cart[p.id]) cart[p.id].qty++;
      else cart[p.id] = { product: p, qty: 1 };
    });
    renderCart();
    cartPanel.classList.add('open');
    toast(`${products.length} products added to cart`);
  }

  function changeQty(id, delta) {
    if (!cart[id]) return;
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
    renderCart();
  }

  function renderCart() {
    const items = Object.values(cart);
    const total = items.reduce((s, i) => s + i.product.price * i.qty, 0);
    cartCountEl.textContent = items.reduce((s, i) => s + i.qty, 0);
    cartTotalEl.textContent = `$${total.toFixed(2)}`;

    if (!items.length) {
      cartItemsEl.innerHTML = `<div class="empty-cart">Your cart is empty</div>`;
      return;
    }

    cartItemsEl.innerHTML = items.map(({ product: p, qty }) => `
      <div class="cart-item">
        <div class="cart-item-img">${p.image_url ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />` : getEmoji(p.id)}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price">$${parseFloat(p.price).toFixed(2)} × ${qty}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${p.id}, +1)">+</button>
        </div>
      </div>`).join('');
  }

  // ── Cart toggle ──
  document.getElementById('cartToggle').addEventListener('click', () => cartPanel.classList.toggle('open'));
  document.getElementById('closeCart').addEventListener('click', () => cartPanel.classList.remove('open'));
  document.getElementById('addAllBtn').addEventListener('click', addAllToCart);

  // ── Grid click delegation ──
  grid.addEventListener('click', (e) => {
    const id = e.target.dataset.id;
    if (!id) return;
    if (e.target.classList.contains('btn-add')) addToCart(id);
    else if (e.target.classList.contains('btn-edit')) startEdit(id);
    else if (e.target.classList.contains('btn-del')) deleteProduct(id);
  });

  // ── Toast ──
  function toast(msg, isErr = false) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.style.background = isErr ? 'var(--danger)' : 'var(--text)';
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }

  // ── Error ──
  function showError(msg) {
    errorBanner.textContent = `⚠️ ${msg}`;
    errorBanner.style.display = 'block';
  }

  // ── Init ──
  loadProducts();
</script>
</body>
</html>
